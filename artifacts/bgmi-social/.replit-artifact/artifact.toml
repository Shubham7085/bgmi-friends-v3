kind = "web"
previewPath = "/"
title = "BGMI Social"
version = "1.0.0"
id = "artifacts/bgmi-social"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24563

[services.development]
run = "pnpm --filter @workspace/bgmi-social run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bgmi-social", "run", "build" ]
publicDir = "artifacts/bgmi-social/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24563"
BASE_PATH = "/"
